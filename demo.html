<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobAnalyzer - 岗位分析工具</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 0; }
        .header h1 { color: #333; margin-bottom: 10px; }
        .search-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .search-box h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        .btn { background: #409eff; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; }
        .btn:hover { background: #66b1ff; }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .chart h3 { color: #333; margin-bottom: 15px; }
        .chart-container { height: 300px; }
        .table-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .table-container h3 { color: #333; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f5f7fa; color: #666; }
        tr:hover { background: #f9f9f9; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; margin-right: 5px; }
        .tag-high { background: #67c23a; color: white; }
        .tag-med { background: #e6a23c; color: white; }
        .tag-low { background: #f56c6c; color: white; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 JobAnalyzer</h1>
            <p>多平台岗位情况分析工具 - 演示版本</p>
        </div>

        <div class="search-box">
            <h2>📊 岗位搜索</h2>
            <div class="form-group">
                <label>岗位关键词</label>
                <input type="text" id="keyword" value="Python" placeholder="请输入岗位关键词，如：Python、前端、Java">
            </div>
            <div class="form-group">
                <label>城市</label>
                <select id="city">
                    <option value="全国">全国</option>
                    <option value="北京">北京</option>
                    <option value="上海">上海</option>
                    <option value="深圳">深圳</option>
                    <option value="杭州">杭州</option>
                    <option value="广州">广州</option>
                </select>
            </div>
            <button class="btn" onclick="search()">🔍 搜索并分析</button>
        </div>

        <div class="charts">
            <div class="chart">
                <h3>💰 薪资分布</h3>
                <div id="salaryChart" class="chart-container"></div>
            </div>
            <div class="chart">
                <h3>🌆 城市分布</h3>
                <div id="cityChart" class="chart-container"></div>
            </div>
            <div class="chart">
                <h3>💼 经验要求</h3>
                <div id="expChart" class="chart-container"></div>
            </div>
            <div class="chart">
                <h3>📚 学历要求</h3>
                <div id="eduChart" class="chart-container"></div>
            </div>
        </div>

        <div class="table-container">
            <h3>📋 岗位列表</h3>
            <table id="jobTable">
                <thead>
                    <tr>
                        <th>岗位名称</th>
                        <th>公司</th>
                        <th>城市</th>
                        <th>薪资</th>
                        <th>经验</th>
                        <th>学历</th>
                        <th>性价比</th>
                    </tr>
                </thead>
                <tbody id="jobTbody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 演示数据
        const demoData = [
            {"title":"Python开发工程师","company":"字节跳动","city":"北京","salary":"25-40K","experience":"3-5年","education":"本科","value_score":95},
            {"title":"Python高级工程师","company":"阿里巴巴","city":"杭州","salary":"30-50K","experience":"5-10年","education":"本科","value_score":88},
            {"title":"Python全栈工程师","company":"腾讯","city":"深圳","salary":"20-35K","experience":"3-5年","education":"本科","value_score":90},
            {"title":"Python后端工程师","company":"美团","city":"北京","salary":"22-38K","experience":"3-5年","education":"本科","value_score":92},
            {"title":"Python爬虫工程师","company":"快手","city":"北京","salary":"18-30K","experience":"1-3年","education":"大专","value_score":85},
            {"title":"Python数据工程师","company":"拼多多","city":"上海","salary":"25-45K","experience":"3-5年","education":"硕士","value_score":87},
            {"title":"Python自动化测试","company":"网易","city":"杭州","salary":"15-25K","experience":"1-3年","education":"本科","value_score":88},
            {"title":"Python机器学习","company":"百度","city":"北京","salary":"35-60K","experience":"5-10年","education":"硕士","value_score":90},
            {"title":"Python初级工程师","company":"小米","city":"北京","salary":"12-20K","experience":"应届生","education":"本科","value_score":82},
            {"title":"Python架构师","company":"华为","city":"深圳","salary":"45-80K","experience":"5-10年","education":"本科","value_score":85}
        ];

        // 初始化图表
        let salaryChart, cityChart, expChart, eduChart;
        function initCharts() {
            salaryChart = echarts.init(document.getElementById('salaryChart'));
            cityChart = echarts.init(document.getElementById('cityChart'));
            expChart = echarts.init(document.getElementById('expChart'));
            eduChart = echarts.init(document.getElementById('eduChart'));
            window.addEventListener('resize', () => {
                salaryChart.resize(); cityChart.resize(); expChart.resize(); eduChart.resize();
            });
        }

        // 搜索分析
        function search() {
            const keyword = document.getElementById('keyword').value;
            const city = document.getElementById('city').value;
            renderCharts(demoData);
            renderTable(demoData);
        }

        // 渲染图表
        function renderCharts(data) {
            // 薪资分布
            const salaryRange = {'10-20K':0,'20-30K':0,'30-40K':0,'40-50K':0,'50K+':0};
            data.forEach(j => {
                const avg = (parseInt(j.salary.split('-')[0]) + parseInt(j.salary.split('-')[1].replace('K','')))/2;
                if (avg<15) salaryRange['10-20K']++;
                else if (avg<25) salaryRange['20-30K']++;
                else if (avg<35) salaryRange['30-40K']++;
                else if (avg<45) salaryRange['40-50K']++;
                else salaryRange['50K+']++;
            });
            salaryChart.setOption({
                tooltip:{trigger:'axis'},
                xAxis:{type:'category',data:Object.keys(salaryRange)},
                yAxis:{type:'value'},
                series:[{type:'bar',data:Object.values(salaryRange),itemStyle:{color:'#409eff'}}]
            });

            // 城市分布
            const cityCount = {};
            data.forEach(j => cityCount[j.city] = (cityCount[j.city]||0)+1;
            cityChart.setOption({
                tooltip:{trigger:'item'},
                series:[{type:'pie',radius:'60%',data:Object.entries(cityCount).map(([n,v])=>({name:n,value:v})}]
            });

            // 经验要求
            const expCount = {};
            data.forEach(j => expCount[j.experience] = (expCount[j.experience]||0)+1);
            expChart.setOption({
                tooltip:{trigger:'item'},
                series:[{type:'pie',radius:['30%','60%'],data:Object.entries(expCount).map(([n,v])=>({name:n,value:v}))}]
            });

            // 学历要求
            const eduCount = {};
            data.forEach(j => eduCount[j.education] = (eduCount[j.education]||0)+1);
            eduChart.setOption({
                tooltip:{trigger:'item'},
                series:[{type:'pie',radius:'60%',data:Object.entries(eduCount).map(([n,v])=>({name:n,value:v}))}]
            });
        }

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('jobTbody');
            tbody.innerHTML = data.map(j => `
                <tr>
                    <td>${j.title}</td>
                    <td>${j.company}</td>
                    <td>${j.city}</td>
                    <td><strong>${j.salary}</strong></td>
                    <td>${j.experience}</td>
                    <td>${j.education}</td>
                    <td><span class="tag ${j.value_score>=90?'tag-high':j.value_score>=80?'tag-med':'tag-low'}">${j.value_score}分</span></td>
                </tr>
            `).join('');
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            search();
        });
    </script>
</body>
</html>
