<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobAnalyzer - 岗位情况分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #1a1a1a; }
.header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 24px; font-weight: 600; }
.header .subtitle { font-size: 14px; opacity: 0.85; margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
.search-panel { background: white; border-radius: 12px; padding: 24px; margin: 20px auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-row input, .search-row select { padding: 10px 16px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.3s; }
.search-row input:focus, .search-row select:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
.search-row input.keyword { flex: 1; min-width: 200px; }
.filter-select { padding: 10px 12px; border: 1px solid #d9d9d9; border-radius: 8px; font-size: 13px; outline: none; transition: border-color 0.3s; background: white; cursor: pointer; min-width: 90px; }
.filter-select:focus { border-color: #667eea; box-shadow: 0 0 0 2px rgba(102,126,234,0.2); }
.link-icon { color: #667eea; text-decoration: none; font-size: 14px; }
.link-icon:hover { color: #764ba2; text-decoration: underline; }
.platform-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.platform-group .group-label { font-size: 12px; color: #999; margin-right: 4px; white-space: nowrap; }
.filter-row { margin-top: 8px; display: flex; gap: 10px; align-items: center; font-size: 12px; color: #999; flex-wrap: wrap; }
.filter-row .filter-label { white-space: nowrap; }
.search-row input.city { width: 120px; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all 0.3s; font-weight: 500; }
.btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary { background: #f0f0f0; color: #333; }
.btn-secondary:hover { background: #e0e0e0; }
.options-row { margin-top: 12px; display: flex; gap: 16px; align-items: center; font-size: 13px; color: #666; }
.options-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.options-row input[type="checkbox"] { accent-color: #667eea; }
.progress-panel { display: none; background: white; border-radius: 12px; padding: 24px; margin: 20px auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.progress-panel.active { display: block; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.progress-header .title { font-weight: 600; font-size: 14px; color: #333; }
.progress-header .stats { font-size: 12px; color: #999; }
.progress-bar-wrapper { width: 100%; height: 10px; background: #f0f0f0; border-radius: 5px; overflow: hidden; margin-bottom: 4px; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 5px; transition: width 0.4s ease; width: 0%; }
.progress-percent { text-align: right; font-size: 13px; color: #667eea; font-weight: 600; margin-bottom: 12px; }
.progress-log { max-height: 200px; overflow-y: auto; background: #fafafa; border-radius: 8px; padding: 12px; font-size: 12px; font-family: 'Courier New', Consolas, monospace; }
.progress-log .log-entry { padding: 3px 0; color: #555; border-bottom: 1px solid #f0f0f0; display: flex; gap: 8px; }
.progress-log .log-entry:last-child { border-bottom: none; }
.progress-log .log-time { color: #999; white-space: nowrap; min-width: 70px; }
.progress-log .log-msg { color: #333; }
.progress-log .log-msg.warn { color: #fa8c16; }
.progress-log .log-entry.current { background: #f0f0ff; margin: 0 -8px; padding: 3px 8px; border-radius: 4px; }
.progress-log .log-entry.current .log-msg { color: #667eea; font-weight: 600; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin: 20px auto; }
.summary-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
.summary-card .label { font-size: 13px; color: #999; margin-bottom: 8px; }
.summary-card .value { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.summary-card .sub { font-size: 12px; color: #999; margin-top: 4px; }
.charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin: 20px auto; }
.chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.chart-card h3 { font-size: 15px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
.chart-container { width: 100%; height: 320px; }
.table-section { background: white; border-radius: 12px; padding: 20px; margin: 20px auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow-x: auto; }
.table-section h3 { font-size: 15px; color: #333; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
.table-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.table-controls .btn { padding: 6px 14px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #fafafa; padding: 10px 8px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
td { padding: 10px 8px; border-bottom: 1px solid #f5f5f5; }
tr:hover { background: #f9f9ff; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-high { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.badge-good { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
.badge-low { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffa39e; }
.badge-platform { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
.sort-icon { cursor: pointer; user-select: none; }
.sort-icon:hover { color: #667eea; }
.results-area { display: none; }
.results-area.active { display: block; }
.footer { text-align: center; padding: 20px; color: #999; font-size: 12px; }
@media (max-width: 768px) {
  .charts-grid { grid-template-columns: 1fr; }
  .search-row { flex-direction: column; }
  .search-row input, .search-row select { width: 100%; }
}
</style>
</head>
<body>

<div class="header">
  <div class="container">
    <div>
      <h1>📊 JobAnalyzer</h1>
      <div class="subtitle">工作岗位情况分析工具 - 多平台数据采集 · 智能分析 · 可视化对比</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="search-panel">
    <div class="search-row">
      <input type="text" class="keyword" id="keyword" placeholder="输入岗位关键词，如：Python、前端、产品经理..." value="Python">
      <input type="text" class="city" id="city" placeholder="城市(可选)">
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">🔍 搜索分析</button>
      <button class="btn btn-secondary" onclick="loadDemo()">📋 加载演示</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">结果筛选：</span>
      <select class="filter-select" id="filterEducation" onchange="applyFilters()">
        <option value="">📚 学历不限</option>
        <option value="大专">大专</option>
        <option value="本科">本科</option>
        <option value="硕士">硕士</option>
        <option value="博士">博士</option>
      </select>
      <select class="filter-select" id="filterSalary" onchange="applyFilters()">
        <option value="">💰 薪资不限</option>
        <option value="0-10">10K以下</option>
        <option value="10-20">10-20K</option>
        <option value="20-30">20-30K</option>
        <option value="30-50">30-50K</option>
        <option value="50-999">50K以上</option>
      </select>
      <select class="filter-select" id="filterExperience" onchange="applyFilters()">
        <option value="">💼 经验不限</option>
        <option value="应届生">应届生</option>
        <option value="1年以下">1年以下</option>
        <option value="1-3年">1-3年</option>
        <option value="3-5年">3-5年</option>
        <option value="5-10年">5-10年</option>
      </select>
    </div>
    <div class="options-row">
      <label><input type="checkbox" id="useMock" checked> 使用模拟数据</label>
      <span class="group-label">|</span>
      <span class="platform-group">
        <span class="group-label">平台：</span>
        <label><input type="checkbox" id="platformBoss" checked> Boss直聘</label>
        <label><input type="checkbox" id="platformZhilian" checked> 智联招聘</label>
        <label><input type="checkbox" id="platformLiepin" checked> 猎聘</label>
        <label><input type="checkbox" id="platformJob51" checked> 前程无忧</label>
        <label><input type="checkbox" id="platformLagou" checked> 拉勾</label>
        <label><input type="checkbox" id="platformMaimai" checked> 脉脉</label>
      </span>
      <span style="margin-left:auto; color:#999">提示：取消"使用模拟数据"将尝试真实爬取（速度较慢）</span>
    </div>
  </div>

  <div class="progress-panel" id="progressPanel">
    <div class="progress-header">
      <span class="title" id="progressTitle">⏳ 等待开始...</span>
      <span class="stats" id="progressStats"></span>
    </div>
    <div class="progress-bar-wrapper">
      <div class="progress-bar-fill" id="progressBar"></div>
    </div>
    <div class="progress-percent" id="progressPercent">0%</div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="summary-grid" id="summaryGrid"></div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>💰 薪资分布</h3>
        <div class="chart-container" id="salaryChart"></div>
      </div>
      <div class="chart-card">
        <h3>🏙️ 城市分布</h3>
        <div class="chart-container" id="cityChart"></div>
      </div>
      <div class="chart-card">
        <h3>💼 经验要求</h3>
        <div class="chart-container" id="expChart"></div>
      </div>
      <div class="chart-card">
        <h3>🏭 行业分布</h3>
        <div class="chart-container" id="typeChart"></div>
      </div>
    </div>
    <div class="chart-card" style="margin: 20px auto;">
      <h3>📊 岗位薪资横向对比</h3>
      <div style="height:400px" id="compareChart"></div>
    </div>
    <div class="table-section">
      <h3>📋 岗位详情列表 <span id="jobCount" style="font-weight:normal;color:#999;font-size:12px"></span></h3>
      <div class="table-controls">
        <button class="btn btn-secondary" onclick="exportData('csv')">📥 导出CSV</button>
        <button class="btn btn-secondary" onclick="exportData('json')">📥 导出JSON</button>
        <button class="btn btn-secondary" onclick="exportData('html')">📥 导出HTML报告</button>
        <button class="btn btn-secondary" onclick="filterRecommend('high')">⭐ 仅看高性价比</button>
        <button class="btn btn-secondary" onclick="filterRecommend('all')">显示全部</button>
      </div>
      <table id="jobTable">
        <thead>
          <tr>
            <th>#</th>
            <th>岗位名称</th>
            <th>公司</th>
            <th>城市</th>
            <th class="sort-icon" onclick="sortTable('salary_avg')">薪资 ⇅</th>
            <th>均薪(K)</th>
            <th>经验</th>
            <th>学历</th>
            <th>公司规模</th>
            <th>行业</th>
            <th>来源</th>
            <th class="sort-icon" onclick="sortTable('value_score')">性价比 ⇅</th>
            <th>推荐</th>
            <th>🔗</th>
          </tr>
        </thead>
        <tbody id="jobTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="footer">JobAnalyzer - 岗位情况分析工具 | 数据仅供参考</div>

<script>
let currentResult = null;
let currentKeyword = '';
let currentFilter = 'all';
let sortField = 'salary_avg';
let sortAsc = true;
let progressStartTime = 0;
let abortController = null;

function formatTime() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0') + ':' +
         d.getSeconds().toString().padStart(2,'0');
}

function formatElapsed() {
  const elapsed = Math.floor((Date.now() - progressStartTime) / 1000);
  if (elapsed < 60) return elapsed + 's';
  return Math.floor(elapsed / 60) + 'm' + (elapsed % 60) + 's';
}

function showProgress(title) {
  document.getElementById('progressPanel').classList.add('active');
  document.getElementById('progressTitle').textContent = title;
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressPercent').textContent = '0%';
  document.getElementById('progressStats').textContent = '';
  document.getElementById('progressLog').innerHTML = '';
  document.getElementById('searchBtn').disabled = true;
  progressStartTime = Date.now();
}

function updateProgress(percent, step, total, message) {
  document.getElementById('progressBar').style.width = percent + '%';
  document.getElementById('progressPercent').textContent = percent + '%';
  document.getElementById('progressStats').textContent =
    `步骤 ${step}/${total} · 耗时 ${formatElapsed()}`;
  document.getElementById('progressTitle').textContent = '🔄 正在采集分析...';
  appendLog(message, '');
}

function appendLog(message, level) {
  const log = document.getElementById('progressLog');
  const entries = log.querySelectorAll('.log-entry');
  entries.forEach(e => e.classList.remove('current'));

  const entry = document.createElement('div');
  entry.className = 'log-entry current';
  entry.innerHTML = `<span class="log-time">${formatTime()}</span><span class="log-msg ${level}">${message}</span>`;
  log.appendChild(entry);
  log.scrollTop = log.scrollHeight;
}

function hideProgress() {
  document.getElementById('progressPanel').classList.remove('active');
  document.getElementById('searchBtn').disabled = false;
  abortController = null;
}

function doSearch() {
  const keyword = document.getElementById('keyword').value.trim();
  if (!keyword) { alert('请输入搜索关键词'); return; }
  const city = document.getElementById('city').value.trim();
  const useMock = document.getElementById('useMock').checked;
  const platforms = [];
  if (document.getElementById('platformBoss').checked) platforms.push('boss');
  if (document.getElementById('platformZhilian').checked) platforms.push('zhilian');
  if (document.getElementById('platformLiepin').checked) platforms.push('liepin');
  if (document.getElementById('platformJob51').checked) platforms.push('job51');
  if (document.getElementById('platformLagou').checked) platforms.push('lagou');
  if (document.getElementById('platformMaimai').checked) platforms.push('maimai');

  currentKeyword = keyword;
  document.getElementById('resultsArea').classList.remove('active');
  showProgress('🚀 正在初始化搜索...');

  if (abortController) abortController.abort();
  abortController = new AbortController();

  fetch('/api/search/stream', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ keyword, city, platforms, use_mock: useMock }),
    signal: abortController.signal,
  })
  .then(response => {
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      return reader.read().then(({ done, value }) => {
        if (done) return;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const event = JSON.parse(line.slice(6));
              handleSSEEvent(event);
            } catch (e) {}
          }
        }
        return read();
      });
    }
    return read();
  })
  .catch(err => {
    if (err.name === 'AbortError') return;
    hideProgress();
    alert('请求失败: ' + err.message);
  });
}

function handleSSEEvent(event) {
  if (event.type === 'start') {
    appendLog(event.message, '');
    updateProgress(0, 0, event.total, event.message);
  } else if (event.type === 'progress') {
    updateProgress(event.percent, event.step, event.total, event.message);
  } else if (event.type === 'log') {
    appendLog(event.message, event.level || '');
  } else if (event.type === 'complete') {
    updateProgress(100, event.total || 100, event.total || 100, '✅ 分析完成！');
    document.getElementById('progressTitle').textContent = '✅ 分析完成';
    setTimeout(() => {
      hideProgress();
      currentResult = event.result;
      renderResults(event.result, currentKeyword);
    }, 500);
  } else if (event.type === 'error') {
    appendLog('❌ ' + event.message, 'warn');
    document.getElementById('progressTitle').textContent = '❌ 出错了';
    setTimeout(hideProgress, 3000);
  }
}

function loadDemo() {
  showProgress('📋 正在加载演示数据...');
  appendLog('正在请求演示数据...', '');
  fetch('/api/demo')
    .then(r => r.json())
    .then(data => {
      updateProgress(100, 1, 1, '✅ 演示数据加载完成');
      document.getElementById('progressTitle').textContent = '✅ 加载完成';
      setTimeout(() => {
        hideProgress();
        currentResult = data;
        currentKeyword = 'Python';
        document.getElementById('keyword').value = 'Python';
        renderResults(data, 'Python');
      }, 400);
    })
    .catch(err => {
      hideProgress();
      alert('加载失败: ' + err.message);
    });
}

function renderResults(data, keyword) {
  document.getElementById('resultsArea').classList.add('active');
  renderSummary(data.summary, data.jobs.length);
  renderSalaryChart(data.salary_distribution);
  renderCityChart(data.location_distribution);
  renderExpChart(data.experience_distribution);
  renderTypeChart(data.company_type_distribution);
  renderCompareChart(data.jobs);
  renderTable(data.jobs);
}

function renderSummary(summary, total) {
  const grid = document.getElementById('summaryGrid');
  if (!summary || !summary.total_jobs) { grid.innerHTML = '<div class="summary-card"><div class="label">暂无数据</div></div>'; return; }
  grid.innerHTML = `
    <div class="summary-card"><div class="label">岗位总数</div><div class="value">${summary.total_jobs}</div></div>
    <div class="summary-card"><div class="label">平均薪资</div><div class="value">${summary.salary_avg}K</div><div class="sub">/月</div></div>
    <div class="summary-card"><div class="label">薪资中位数</div><div class="value">${summary.salary_median}K</div><div class="sub">/月</div></div>
    <div class="summary-card"><div class="label">薪资范围</div><div class="value" style="font-size:20px">${summary.salary_min}K~${summary.salary_max}K</div></div>
    <div class="summary-card"><div class="label">热门城市</div><div class="value" style="font-size:16px">${(summary.top_cities||[]).map(c=>c[0]).join(' · ')}</div></div>
    <div class="summary-card"><div class="label">经验要求</div><div class="value" style="font-size:16px">${(summary.top_experience||[]).map(e=>e[0]).join(' · ')}</div></div>
  `;
}

function renderSalaryChart(data) {
  const chart = echarts.init(document.getElementById('salaryChart'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'category', data: data.map(d => d.range), axisLabel: { fontSize: 11 } },
    yAxis: { type: 'value', name: '岗位数' },
    series: [{
      type: 'bar', data: data.map(d => d.count),
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
          { offset: 0, color: '#667eea' }, { offset: 1, color: '#764ba2' }
        ]),
        borderRadius: [4, 4, 0, 0]
      },
      label: { show: true, position: 'top', fontSize: 11 }
    }],
    grid: { left: 40, right: 20, top: 30, bottom: 30 }
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderCityChart(data) {
  const chart = echarts.init(document.getElementById('cityChart'));
  chart.setOption({
    tooltip: { trigger: 'item' },
    series: [{
      type: 'pie', radius: ['35%', '65%'],
      data: data.map(d => ({ name: d.city, value: d.count })),
      label: { fontSize: 11 },
      itemStyle: { borderColor: '#fff', borderWidth: 2 },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.2)' } }
    }],
    color: ['#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a','#fee140','#a18cd1','#fbc2eb','#a6c1ee','#84fab0','#fccb90']
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderExpChart(data) {
  const chart = echarts.init(document.getElementById('expChart'));
  chart.setOption({
    tooltip: { trigger: 'item' },
    series: [{
      type: 'pie', radius: '65%',
      data: data.map(d => ({ name: d.experience, value: d.count })),
      label: { fontSize: 11 },
      roseType: 'radius',
      itemStyle: { borderColor: '#fff', borderWidth: 2 }
    }],
    color: ['#667eea','#764ba2','#f093fb','#4facfe','#43e97b','#fa709a','#fee140']
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderTypeChart(data) {
  const chart = echarts.init(document.getElementById('typeChart'));
  chart.setOption({
    tooltip: { trigger: 'axis' },
    xAxis: { type: 'value' },
    yAxis: { type: 'category', data: data.map(d => d.type).reverse(), axisLabel: { fontSize: 11 } },
    series: [{
      type: 'bar',
      data: data.map(d => d.count).reverse(),
      itemStyle: {
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#667eea' }, { offset: 1, color: '#764ba2' }
        ]),
        borderRadius: [0, 4, 4, 0]
      },
      label: { show: true, position: 'right', fontSize: 11 }
    }],
    grid: { left: 60, right: 40, top: 10, bottom: 10 }
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderCompareChart(jobs) {
  const top = jobs.slice(-20).reverse();
  const chart = echarts.init(document.getElementById('compareChart'));
  chart.setOption({
    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
    legend: { data: ['薪资下限', '薪资上限', '性价比评分'], top: 0 },
    grid: { left: 160, right: 40, top: 40, bottom: 30 },
    xAxis: [
      { type: 'value', name: '薪资(K)', position: 'bottom' },
      { type: 'value', name: '评分', position: 'top', max: 100 }
    ],
    yAxis: { type: 'category', data: top.map(j => (j.company || '').substring(0,8) + ' · ' + (j.job_title || '').substring(0,10)), axisLabel: { fontSize: 10 } },
    series: [
      {
        name: '薪资下限', type: 'bar', stack: 'salary',
        data: top.map(j => j.salary_min),
        itemStyle: { color: 'rgba(102,126,234,0.4)', borderRadius: [0,0,0,0] }
      },
      {
        name: '薪资上限', type: 'bar', stack: 'salary',
        data: top.map(j => j.salary_max - j.salary_min),
        itemStyle: { color: 'rgba(118,75,162,0.7)', borderRadius: [0,4,4,0] }
      },
      {
        name: '性价比评分', type: 'line', xAxisIndex: 1,
        data: top.map(j => j.value_score),
        lineStyle: { color: '#fa709a', width: 2 },
        itemStyle: { color: '#fa709a' },
        symbol: 'circle', symbolSize: 6
      }
    ]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderTable(jobs) {
  const tbody = document.getElementById('jobTableBody');
  let filtered = jobs;
  if (currentFilter === 'high') {
    filtered = jobs.filter(j => j.recommendation && j.recommendation.includes('高性价比'));
  }
  filtered = applyClientFilters(filtered);
  document.getElementById('jobCount').textContent = `(筛选后 ${filtered.length}/${jobs.length} 条)`;
  tbody.innerHTML = filtered.map((j, i) => {
    let badgeClass = 'badge-good';
    if (j.recommendation && j.recommendation.includes('高性价比')) badgeClass = 'badge-high';
    else if (j.recommendation && j.recommendation.includes('偏低')) badgeClass = 'badge-low';
    const linkHtml = j.job_url
      ? `<a href="${esc(j.job_url)}" target="_blank" class="link-icon" title="打开岗位链接">🔗</a>`
      : '<span style="color:#ccc">—</span>';
    return `<tr>
      <td>${i+1}</td>
      <td style="font-weight:500">${esc(j.job_title)}</td>
      <td>${esc(j.company)}</td>
      <td>${esc(j.location)}</td>
      <td>${esc(j.salary_raw)}</td>
      <td style="font-weight:600;color:#667eea">${j.salary_avg}</td>
      <td>${esc(j.experience)}</td>
      <td>${esc(j.education)}</td>
      <td>${esc(j.company_size)}</td>
      <td>${esc(j.company_type)}</td>
      <td><span class="badge badge-platform">${esc(j.platform)}</span></td>
      <td style="font-weight:600">${j.value_score}</td>
      <td><span class="badge ${badgeClass}">${esc(j.recommendation)}</span></td>
      <td>${linkHtml}</td>
    </tr>`;
  }).join('');
}

function applyClientFilters(jobs) {
  let filtered = jobs;
  const edu = document.getElementById('filterEducation').value;
  if (edu) {
    filtered = filtered.filter(j => (j.education || '').includes(edu));
  }
  const sal = document.getElementById('filterSalary').value;
  if (sal) {
    const [lo, hi] = sal.split('-').map(Number);
    filtered = filtered.filter(j => {
      const avg = j.salary_avg || 0;
      return avg >= lo && avg < hi;
    });
  }
  const exp = document.getElementById('filterExperience').value;
  if (exp) {
    filtered = filtered.filter(j => (j.experience || '').includes(exp));
  }
  return filtered;
}

function applyFilters() {
  if (currentResult) renderTable(currentResult.jobs);
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function sortTable(field) {
  if (sortField === field) { sortAsc = !sortAsc; } else { sortField = field; sortAsc = true; }
  if (currentResult && currentResult.jobs) {
    currentResult.jobs.sort((a, b) => sortAsc ? (a[field] || 0) - (b[field] || 0) : (b[field] || 0) - (a[field] || 0));
    renderTable(currentResult.jobs);
  }
}

function filterRecommend(type) {
  currentFilter = type;
  if (currentResult) renderTable(currentResult.jobs);
}

function exportData(fmt) {
  if (!currentResult) { alert('暂无数据'); return; }
  fetch('/api/export', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ keyword: currentKeyword, result: currentResult, format: fmt })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) alert('导出失败: ' + data.error);
    else alert('导出成功: ' + data.filepath);
  })
  .catch(err => alert('导出失败: ' + err.message));
}

document.getElementById('keyword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

window.addEventListener('load', loadDemo);
</script>
